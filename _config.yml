# Hexo Configuration
# Keys: https://hexo.io/docs/configuration.html

# Site
title: 宋青的博客
subtitle: 全栈开发者 · 写作者
description: 热爱编程、设计与阅读。在这里记录技术思考与日常生活，用文字沉淀所学所得。
keywords: 宋青, 博客, 全栈开发
author: 宋青
language: zh-CN
timezone: Asia/Shanghai

# URL
url: http://www.songqing.online
root: /
permalink: posts/:abbrlink.html
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (default = date descending)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 其他
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
# Hexo uses Moment.js to format dates
# http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
# Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
# include: [pattern, pattern, ...]
# exclude: [pattern, pattern, ...]
# keep: [pattern, pattern, ...]
include:
exclude:
keep:

# Theme
theme: anzhiyu
